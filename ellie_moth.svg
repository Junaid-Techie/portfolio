<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
    <!-- Ellie's Tattoo Moth (Authentic Sphinx / Hawk Moth Design) -->
    
    <!-- Central Segmented Furry Body -->
    <ellipse cx="50" cy="30" rx="3.5" ry="4.5" fill="currentColor"/>
    <ellipse cx="50" cy="42" rx="5.5" ry="8" fill="currentColor"/>
    <path d="M 50 50 L 46 52 L 46 59 L 50 78 L 54 59 L 54 52 Z" fill="currentColor"/>
    <line x1="46" y1="56" x2="54" y2="56" stroke="var(--bg-color, #0f110d)" stroke-width="1.2"/>
    <line x1="47" y1="62" x2="53" y2="62" stroke="var(--bg-color, #0f110d)" stroke-width="1.2"/>
    <line x1="48" y1="68" x2="52" y2="68" stroke="var(--bg-color, #0f110d)" stroke-width="1.2"/>
    
    <!-- Feathered/Comb Antennae (Signature Moth Detail) -->
    <!-- Left Antenna -->
    <path d="M 47 27 C 42 22 36 21 34 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 45 25 L 43 21 M 43 24 L 40 20 M 41 23 L 37 19 M 38 22 L 34 19 M 36 21 L 32 19" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <!-- Right Antenna -->
    <path d="M 53 27 C 58 22 64 21 66 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 55 25 L 57 21 M 57 24 L 60 20 M 59 23 L 63 19 M 62 22 L 66 19 M 64 21 L 68 19" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>

    <!-- Forewings (Hawk Moth signature angular sweep) -->
    <!-- Left Forewing -->
    <path d="M 48 38 C 30 36 12 25 5 28 C 0 30 8 48 18 58 C 28 68 40 68 46 54 Z" fill="currentColor"/>
    <!-- Stenciled veins/creases for aesthetic depth -->
    <path d="M 12 36 C 20 42 28 48 35 48" stroke="var(--bg-color, #0f110d)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M 8 42 C 16 48 24 54 30 54" stroke="var(--bg-color, #0f110d)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    
    <!-- Right Forewing -->
    <path d="M 52 38 C 70 36 88 25 95 28 C 100 30 92 48 82 58 C 72 68 60 68 54 54 Z" fill="currentColor"/>
    <!-- Stenciled veins/creases -->
    <path d="M 88 36 C 80 42 72 48 65 48" stroke="var(--bg-color, #0f110d)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M 92 42 C 84 48 76 54 70 54" stroke="var(--bg-color, #0f110d)" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Hindwings (Smaller lower wings) -->
    <!-- Left Hindwing -->
    <path d="M 46 48 C 38 52 24 58 22 66 C 20 74 34 76 45 64 Z" fill="currentColor"/>
    <!-- Right Hindwing -->
    <path d="M 54 48 C 62 52 76 58 78 66 C 80 74 66 76 55 64 Z" fill="currentColor"/>
</svg>

  <text x="876" y="265" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">Kafka</text>

  <!-- Divider line 2 -->
  <line x1="100" y1="305" x2="1100" y2="305" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>

  <!-- Expertise cards -->
  <!-- Lakehouse Architecture -->
  <rect x="100" y="325" width="230" height="145" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
  <rect x="100" y="325" width="5" height="145" rx="3" fill="#3b82f6"/>
  <text x="180" y="395" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Lakehouse</text>
  <text x="180" y="420" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Architecture</text>

  <!-- ETL/ELT Pipelines -->
  <rect x="355" y="325" width="230" height="145" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
  <rect x="355" y="325" width="5" height="145" rx="3" fill="#3b82f6"/>
  <text x="435" y="395" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">ETL/ELT</text>
  <text x="435" y="420" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Pipelines</text>

  <!-- ML Data Engineering -->
  <rect x="610" y="325" width="230" height="145" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
  <rect x="610" y="325" width="5" height="145" rx="3" fill="#3b82f6"/>
  <text x="690" y="395" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">ML Data</text>
  <text x="690" y="420" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Engineering</text>

  <!-- Generative AI Platforms -->
  <rect x="865" y="325" width="235" height="145" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
  <rect x="865" y="325" width="5" height="145" rx="3" fill="#3b82f6"/>
  <text x="950" y="395" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Generative AI</text>
  <text x="950" y="420" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Platforms</text>

  <!-- Divider line 3 -->
  <line x1="100" y1="500" x2="1100" y2="500" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>

  <!-- Footer info row -->
  <text x="100" y="543" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="rgba(148,163,184,0.8)">M.S. Applied Data Science</text>
  <text x="425" y="543" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="rgba(100,116,139,0.7)">|</text>
  <text x="455" y="543" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="rgba(148,163,184,0.8)">Indiana University Indianapolis</text>
  <text x="750" y="543" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="rgba(100,116,139,0.7)">|</text>
  <text x="780" y="543" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="rgba(148,163,184,0.8)">junaid-techie.github.io</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1a3a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.06)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" rx="0"/>

  <!-- Subtle grid overlay -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(59,130,246,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glowing blue accent blobs -->
  <ellipse cx="200" cy="150" rx="300" ry="200" fill="rgba(59,130,246,0.06)"/>
  <ellipse cx="1100" cy="500" rx="250" ry="180" fill="rgba(99,102,241,0.05)"/>

  <!-- Left blue accent bar -->
  <rect x="72" y="72" width="5" height="160" rx="3" fill="#3b82f6" filter="url(#subtleGlow)"/>

  <!-- Name -->
  <text x="100" y="135" font-family="'Segoe UI', system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-1">Junaid Ahmed Mohammed</text>

  <!-- Title -->
  <text x="100" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="500" fill="#60a5fa" letter-spacing="5">SENIOR DATA ENGINEER &amp; AI PLATFORM ENGINEER</text>

  <!-- Divider line -->
  <line x1="100" y1="215" x2="1100" y2="215" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>

  <!-- Tech skill pills -->
  <!-- Azure -->
  <rect x="100" y="240" width="110" height="40" rx="20" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="265" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">Azure</text>

  <!-- Snowflake -->
  <rect x="225" y="240" width="140" height="40" rx="20" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="265" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">Snowflake</text>

  <!-- Databricks -->
  <rect x="378" y="240" width="145" height="40" rx="20" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="451" y="265" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">Databricks</text>

  <!-- PySpark -->
  <rect x="538" y="240" width="120" height="40" rx="20" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="598" y="265" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">PySpark</text>

  <!-- Delta Lake -->
  <rect x="673" y="240" width="135" height="40" rx="20" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="741" y="265" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">Delta Lake</text>

  <!-- Kafka -->
